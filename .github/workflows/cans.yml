name: Cans post

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate feed
        run: node generate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WALLET_ENCRYPTION_KEY: ${{ secrets.WALLET_ENCRYPTION_KEY }}
          MASTER_FAUCET_SECRET_KEY: ${{ secrets.MASTER_FAUCET_SECRET_KEY }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}

      - name: Commit and push feed
        run: |
          if [ -f generate_error.txt ]; then
            echo "=== GENERATION ERRORS DETECTED ==="
            cat generate_error.txt
            echo "=================================="
          fi
          git config user.name "OnlyCrans Bot"
          git config user.email "bot@onlycrans.xyz"
          git add feed.json creators.json
          if [ -f generate_error.txt ]; then
            git add generate_error.txt
          fi
          git diff --cached --quiet || git commit -m "🥫 new sauce dropped & wallets synced"
          git push
